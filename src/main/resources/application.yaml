spring:
  application:
    name: BloomWay

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USER}
    password: ${DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: PostgreSQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret-key: ${JWT_SECRET_KEY}


stripe:
  api:
    secret: ${STRIPE_SECRET}
  webhook:
    secret: ${WEBHOOK_SECRET}

client:
  url: http:localhost:8080

server:
  port: 2030